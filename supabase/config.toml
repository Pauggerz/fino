
[functions.parse-receipt]
enabled = true
verify_jwt = true
import_map = "./functions/parse-receipt/deno.json"
entrypoint = "./functions/parse-receipt/index.ts"

[functions.split-receipt]
enabled = true
verify_jwt = false
import_map = "./functions/split-receipt/deno.json"
entrypoint = "./functions/split-receipt/index.ts"

# Public on purpose (mirrors split-receipt): local-only users have no session,
# and the function carries its own throttle + 280-char cap + generic errors
# (REVIEW_2026-07-08 P1.3). Deployed 2026-07-10 with --no-verify-jwt.
[functions.brain-assist]
enabled = true
verify_jwt = false
import_map = "./functions/brain-assist/deno.json"
entrypoint = "./functions/brain-assist/index.ts"

# Gateway-verified AND self-validated: the function resolves the caller's uid
# from their own bearer token via the service-role client before deleting.
[functions.delete-account]
enabled = true
verify_jwt = true
entrypoint = "./functions/delete-account/index.ts"
